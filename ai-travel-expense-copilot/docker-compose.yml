services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - POLICY_DIR=/app/sample_data/policies
    depends_on:
      - clickhouse

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  clickhouse_data:
